<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Đăng ký</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .form-container { width: 100%; max-width: 400px; padding: 20px; border: 1px solid #ccc; border-radius: 8px; box-shadow: 2px 2px 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="email"], input[type="password"] { width: 100%; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .error { color: red; font-size: 14px; margin-top: 5px; display: none; }
        .success { color: green; font-weight: bold; text-align: center; display: none; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Đăng ký Tài khoản</h2>
        <form id="registerForm">
            <div class="form-group">
                <label>Tên</label>
                <input type="text" id="name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
                <div class="error" id="emailErr">Email không hợp lệ!</div>
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="password" required>
                <div class="error" id="pwErr">Mật khẩu phải >= 8 ký tự, gồm chữ hoa, thường và số!</div>
            </div>
            <div class="form-group">
                <label><input type="checkbox" id="terms" required> Đồng ý điều khoản</label>
            </div>
            <button type="submit">Đăng Ký</button>
        </form>
        <div class="success" id="successMsg">Đăng ký thành công! Đã lưu vào LocalStorage.</div>
        <br><a href="index.html" style="display:block;text-align:center;">← Quay lại Menu</a>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        
        form.addEventListener('submit', function(e) {
            e.preventDefault(); // Ngăn load lại trang
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const emailErr = document.getElementById('emailErr');
            const pwErr = document.getElementById('pwErr');
            const successMsg = document.getElementById('successMsg');
            
            let isValid = true;

            // Validate Email bằng Regex
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if(!emailRegex.test(email)) {
                emailErr.style.display = 'block';
                isValid = false;
            } else {
                emailErr.style.display = 'none';
            }

            // Validate Mật khẩu (Ít nhất 8 ký tự, 1 Hoa, 1 Thường, 1 Số)
            const pwRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)[a-zA-Z\d]{8,}$/;
            if(!pwRegex.test(password)) {
                pwErr.style.display = 'block';
                isValid = false;
            } else {
                pwErr.style.display = 'none';
            }

            if(isValid) {
                // Lưu vào LocalStorage
                const userData = { name: name, email: email };
                localStorage.setItem('currentUser', JSON.stringify(userData));
                
                successMsg.style.display = 'block';
                form.reset();
            }
        });
    </script>
</body>
</html>
